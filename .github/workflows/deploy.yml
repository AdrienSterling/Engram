# Deploy to VPS
# Builds Docker image and deploys to production server

name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            # 克隆或更新 Engram 代码
            if [ -d "/opt/app/engram/.git" ]; then
              echo "📦 Updating existing repo..."
              cd /opt/app/engram
              git fetch origin main
              git reset --hard origin/main
            else
              echo "📦 Cloning repo..."
              rm -rf /opt/app/engram
              git clone https://github.com/AdrienSterling/Engram.git /opt/app/engram
              cd /opt/app/engram
            fi

            # 克隆或更新 Obsidian Vault 仓库
            VAULT_DIR="/opt/app/obsidian-vault"
            if [ -d "$VAULT_DIR/.git" ]; then
              echo "📚 Updating obsidian-vault..."
              cd $VAULT_DIR
              git pull origin main || true
            else
              echo "📚 Cloning obsidian-vault..."
              rm -rf $VAULT_DIR
              git clone https://${{ secrets.GH_PAT }}@github.com/AdrienSterling/obsidian-vault.git $VAULT_DIR
            fi

            # 配置 vault 的 Git 凭证（用于容器内推送）
            cd $VAULT_DIR
            git config user.name "Engram Bot"
            git config user.email "bot@engram.local"
            git remote set-url origin https://${{ secrets.GH_PAT }}@github.com/AdrienSterling/obsidian-vault.git

            # 确保 vault 目录权限正确
            chmod -R 777 $VAULT_DIR

            cd /opt/app/engram

            # 从 GitHub Secrets 生成 .env 文件
            cat > .env << 'ENVEOF'
            TELEGRAM_TOKEN=${{ secrets.TELEGRAM_TOKEN }}
            VAULT_PATH=/opt/app/obsidian-vault
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            OPENAI_MODEL=${{ secrets.OPENAI_MODEL }}
            DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            DEFAULT_LLM=${{ secrets.DEFAULT_LLM }}
            GIT_ENABLED=true
            GIT_USER_NAME=Engram Bot
            GIT_USER_EMAIL=bot@engram.local
            LOG_LEVEL=${{ secrets.LOG_LEVEL }}
            ENVEOF

            # 只在 Secrets 存在时追加可选配置
            if [ -n "${{ secrets.DEEPSEEK_MODEL }}" ]; then
              echo "DEEPSEEK_MODEL=${{ secrets.DEEPSEEK_MODEL }}" >> .env
            fi
            if [ -n "${{ secrets.DEEPSEEK_BASE_URL }}" ]; then
              echo "DEEPSEEK_BASE_URL=${{ secrets.DEEPSEEK_BASE_URL }}" >> .env
            fi
            if [ -n "${{ secrets.OPENAI_BASE_URL }}" ]; then
              echo "OPENAI_BASE_URL=${{ secrets.OPENAI_BASE_URL }}" >> .env
            fi
            if [ -n "${{ secrets.GEMINI_MODEL }}" ]; then
              echo "GEMINI_MODEL=${{ secrets.GEMINI_MODEL }}" >> .env
            fi

            # 去除 .env 中的前导空格
            sed -i 's/^[[:space:]]*//' .env

            # 登录 GitHub Container Registry
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 强制停止并删除旧容器
            docker stop engram-bot 2>/dev/null || true
            docker rm -f engram-bot 2>/dev/null || true
            docker-compose down --remove-orphans 2>/dev/null || true

            # 清理宿主机上残留的临时文件
            rm -rf /tmp/engram_* /tmp/engram_screenshot_* 2>/dev/null || true

            # 拉取最新镜像并启动
            docker-compose pull
            docker-compose up -d

            # 清理旧镜像
            docker image prune -f

            # 显示状态
            docker-compose ps
            docker-compose logs --tail=20

            # DeepSeek 连通性诊断
            echo ""
            echo "=== DeepSeek API Diagnostic ==="
            DEEPSEEK_KEY="${{ secrets.DEEPSEEK_API_KEY }}"
            echo "Testing connectivity..."
            curl -sI --max-time 10 https://api.deepseek.com/v1/models 2>&1 || echo "❌ Connection failed"
            echo ""
            echo "Checking balance..."
            curl -s --max-time 10 -H "Authorization: Bearer $DEEPSEEK_KEY" https://api.deepseek.com/user/balance 2>&1 || echo "❌ Balance check failed"
            echo ""
            echo "=== Bot container logs (runtime errors) ==="
            docker logs engram-bot --tail 30 2>&1
